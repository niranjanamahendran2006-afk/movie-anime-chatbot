<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="docked full-width top-0 sticky bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 flex justify-between items-center w-full px-margin-mobile h-16 z-50 max-w-[720px] mx-auto transition-all duration-200 ease-in-out">
<button class="text-on-surface-variant hover:bg-surface-container-high/50 p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="movie_edit">movie_edit</span>
</button>
<h1 class="font-h2 text-h2 font-bold text-primary">watchagonnawatch</h1>
<button class="text-on-surface-variant hover:bg-surface-container-high/50 p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Chat Container -->
<main id="chat-container" class="w-full max-w-[720px] flex-1 flex flex-col px-margin-mobile py-margin-desktop gap-bubble-gap pb-32">
</main>
<!-- Input Field Area -->
<div class="fixed bottom-16 md:bottom-0 w-full max-w-[720px] bg-surface/90 backdrop-blur-md border-t border-outline-variant/20 p-margin-mobile pb-safe z-40">
<div id="image-preview-container" class="hidden mb-2 flex items-center gap-2">
  <img id="image-preview" class="w-16 h-16 object-cover rounded-md shadow-sm" />
  <button id="remove-image-btn" class="text-error text-sm font-semibold hover:underline">Remove</button>
</div>
<div class="relative flex items-center w-full">
<button id="attach-btn" class="absolute left-2 text-on-surface-variant p-2 rounded-full flex items-center justify-center hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">attach_file</span>
</button>
<input id="chat-input" class="w-full bg-surface-container-low border border-surface-variant rounded-full py-3 pl-12 pr-12 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/50 shadow-inner placeholder-on-surface-variant/50" placeholder="Ask CineBot..." type="text" />
<button id="send-btn" class="absolute right-2 bg-primary text-on-primary p-2 rounded-full flex items-center justify-center hover:bg-primary/90 transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed" disabled>
<span class="material-symbols-outlined" data-icon="arrow_upward">arrow_upward</span>
</button>
<input type="file" id="file-input" accept="image/*" class="hidden" />
</div>
</div>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-margin-mobile pb-safe max-w-[720px] left-1/2 -translate-x-1/2 bg-surface/80 backdrop-blur-md border-t border-outline-variant/30">
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1 scale-95 active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="chat_bubble" data-weight="fill" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="font-label-md text-label-md mt-0.5">Chat</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:text-primary scale-95 active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-label-md text-label-md mt-0.5">Explore</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:text-primary scale-95 active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md mt-0.5">Profile</span>
</button>
</nav>

<script>
let conversationHistory = [];

const chatContainer = document.getElementById('chat-container');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const attachBtn = document.getElementById('attach-btn');
const fileInput = document.getElementById('file-input');
const imagePreviewContainer = document.getElementById('image-preview-container');
const imagePreview = document.getElementById('image-preview');
const removeImageBtn = document.getElementById('remove-image-btn');

let selectedFile = null;

// Empty-send guard
function toggleSend() {
  const hasText = chatInput.value.trim() !== '';
  const hasFile = selectedFile !== null;
  sendBtn.disabled = !(hasText || hasFile);
}

chatInput.addEventListener('input', toggleSend);

// Attach file
attachBtn.addEventListener('click', () => {
  fileInput.click();
});

fileInput.addEventListener('change', (e) => {
  if (e.target.files && e.target.files[0]) {
    selectedFile = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
      imagePreview.src = e.target.result;
      imagePreviewContainer.classList.remove('hidden');
    };
    reader.readAsDataURL(selectedFile);
    toggleSend();
  }
});

removeImageBtn.addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  imagePreviewContainer.classList.add('hidden');
  imagePreview.src = '';
  toggleSend();
});

function appendMessage(role, text) {
  const wrapper = document.createElement('div');
  wrapper.className = role === 'user' ? "flex justify-end w-full" : "flex justify-start w-full";
  
  const bubble = document.createElement('div');
  if (role === 'user') {
    bubble.className = "bg-surface-container-highest text-on-surface font-body-md text-body-md px-4 py-3 rounded-xl rounded-tr-sm max-w-[85%] border border-outline-variant/20";
    bubble.innerHTML = text.replace(/\\n/g, '<br>');
  } else {
    bubble.className = "bg-surface-container-lowest text-on-surface font-body-md text-body-md p-padding-card rounded-xl rounded-tl-sm max-w-[85%] bot-shadow flex flex-col gap-3 markdown-body";
    bubble.innerHTML = marked.parse(text);
  }
  
  wrapper.appendChild(bubble);
  chatContainer.appendChild(wrapper);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function appendImageMessage(file, text) {
  const wrapper = document.createElement('div');
  wrapper.className = "flex justify-end w-full";
  
  const bubble = document.createElement('div');
  bubble.className = "bg-surface-container-highest text-on-surface font-body-md text-body-md px-4 py-3 rounded-xl rounded-tr-sm max-w-[85%] border border-outline-variant/20 flex flex-col gap-2";
  
  const img = document.createElement('img');
  img.src = URL.createObjectURL(file);
  img.className = "w-48 object-cover rounded-md";
  bubble.appendChild(img);
  
  if (text) {
    const textNode = document.createElement('span');
    textNode.textContent = text;
    bubble.appendChild(textNode);
  }
  
  wrapper.appendChild(bubble);
  chatContainer.appendChild(wrapper);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function showLoading() {
  const wrapper = document.createElement('div');
  wrapper.id = 'loading-bubble';
  wrapper.className = "flex justify-start w-full";
  
  const bubble = document.createElement('div');
  bubble.className = "bg-surface-container-lowest text-on-surface font-body-md text-body-md p-padding-card rounded-xl rounded-tl-sm max-w-[85%] bot-shadow";
  bubble.innerHTML = "<em>typing...</em>";
  
  wrapper.appendChild(bubble);
  chatContainer.appendChild(wrapper);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function hideLoading() {
  const loading = document.getElementById('loading-bubble');
  if (loading) {
    loading.remove();
  }
}

async function sendMessage() {
  if (sendBtn.disabled) return;
  
  const messageText = chatInput.value.trim();
  const fileToUpload = selectedFile;
  
  // Clear input
  chatInput.value = '';
  removeImageBtn.click(); // resets file
  toggleSend();
  
  // Display user message
  if (fileToUpload) {
    appendImageMessage(fileToUpload, messageText);
  } else {
    appendMessage('user', messageText);
  }
  
  showLoading();
  
  try {
    let response;
    
    if (fileToUpload) {
      const formData = new FormData();
      formData.append('file', fileToUpload);
      if (messageText) {
        formData.append('message', messageText);
      }
      
      response = await fetch('/vision', {
        method: 'POST',
        body: formData
      });
    } else {
      // Add text to history locally (we will push it to the server)
      // wait, the server uses the history to generate response, but the current message is separate in the API
      // Let's send current history and message separately
      const currentHistory = [...conversationHistory];
      
      response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: messageText,
          history: currentHistory
        })
      });
      
      conversationHistory.push({ role: 'user', parts: [messageText] });
    }
    
    const data = await response.json();
    hideLoading();
    appendMessage('model', data.reply);
    
    if (!fileToUpload) {
       conversationHistory.push({ role: 'model', parts: [data.reply] });
    }
    
  } catch (err) {
    hideLoading();
    appendMessage('model', "Something went wrong — please retry.");
  }
}

sendBtn.addEventListener('click', sendMessage);

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !sendBtn.disabled) {
    sendMessage();
  }
});
</script>
